name: Check and Publish ConvertX

on:
  workflow_dispatch: # Allow manual trigger

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/convertx

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all tags

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get versions
        id: versions
        run: |
          # Get latest ConvertX version
          LATEST_VERSION=$(curl -s "https://api.github.com/repos/C4illin/ConvertX/releases/latest" | grep '"tag_name":' | sed -E 's/.*"v?([^"]+)".*/\1/')

          # Get current version from latest git tag
          CURRENT_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          # Remove 'v' prefix if present
          CURRENT_VERSION=${CURRENT_VERSION#v}

          echo "current_version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT
          echo "latest_version=${LATEST_VERSION}" >> $GITHUB_OUTPUT

          echo "ConvertX: ${CURRENT_VERSION} -> ${LATEST_VERSION}"

      - name: Check if update needed
        id: check
        run: |
          if [ "${{ steps.versions.outputs.current_version }}" != "${{ steps.versions.outputs.latest_version }}" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "New version available: ${{ steps.versions.outputs.latest_version }}"
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
            echo "No new version available. Current version is up-to-date."
          fi

      - name: Build and push Docker image
        if: steps.check.outputs.update_needed == 'true'
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/386,linux/arm64,linux/arm/v7,linux/arm/v6,linux/riscv64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            QBIT_TAG=${{ steps.versions.outputs.latest_qbit_standard }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.versions.outputs.latest_qbit_standard }}_${{ steps.versions.outputs.latest_vuetorrent }}
            ${{ env.IMAGE_NAME }}:latest
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: true
          sbom: true

      - name: Create and push git tag
        if: steps.check.outputs.update_needed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git tag -a "v${{ steps.versions.outputs.latest_version }}" -m "Update to version ${{ steps.versions.outputs.latest_version }}"
          git push origin --tags
